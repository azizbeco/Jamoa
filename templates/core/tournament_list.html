{% extends 'base.html' %}
{% block content %}
<style>
    .tournament-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
        margin-top: 24px;
    }

    .tournament-card {
        background: #111;
        border: 1px solid var(--border-subtle);
        border-radius: 20px;
        overflow: hidden;
        transition: 0.3s ease;
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .tournament-card:hover {
        transform: translateY(-5px);
        border-color: rgba(255, 255, 255, 0.1);
    }

    .banner-box {
        height: 140px;
        position: relative;
        background: #000;
        overflow: hidden;
    }

    .banner-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.7;
    }

    .status-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 4px 10px;
        border-radius: 100px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        z-index: 2;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
    }

    .status-upcoming {
        color: #60a5fa;
        border: 1px solid #60a5fa44;
    }

    .status-ongoing {
        color: #34d399;
        border: 1px solid #34d39944;
    }

    .status-finished {
        color: #94a3b8;
        border: 1px solid #94a3b844;
    }

    .info-area {
        padding: 20px;
        flex-grow: 1;
    }

    .game-name {
        font-size: 11px;
        font-weight: 700;
        color: #64748b;
        margin-bottom: 8px;
        display: block;
    }

    .tourney-name {
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 12px;
        line-height: 1.3;
    }

    .meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
        padding-top: 16px;
        border-top: 1px solid #222;
    }

    .prize-val {
        color: #fbbf24;
        font-weight: 700;
        font-size: 13px;
    }

    .date-val {
        color: #64748b;
        font-size: 11px;
    }

    .view-btn {
        display: block;
        width: 100%;
        padding: 10px;
        text-align: center;
        background: #1e293b;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        border-top: 1px solid #222;
        transition: 0.2s;
    }

    .view-btn:hover {
        background: #2d3e5a;
    }
</style>
<div style="grid-column: 1 / span 3; max-width: 1200px; margin: 0 auto; width: 100%;">
    <div style="margin-bottom: 32px;">
        <h1 style="margin:0; font-size:28px;">Tournaments</h1>
        <p style="margin:4px 0 0 0; color:#64748b;">Legendary battles start here.</p>
    </div>
    <div class="tournament-grid">
        {{ tournament_cards_html|safe }}
    </div>
</div>
{% endblock %}
