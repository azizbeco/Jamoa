{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root {
        --accent-blue: #3b82f6;
        --dark-bg: #0d1117;
        --form-bg: #111827;
        --border-color: #1f2937;
    }

    .auth-page-wrapper {
        grid-column: 1 / -1;
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background-color: #000;
    }

    .gaming-auth-container {
        display: flex;
        width: 100%;
        max-width: 1000px;
        background: var(--dark-bg);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        min-height: 550px;
    }

    .gaming-auth-left {
        flex: 1;
        background-color: #000;
        background-image: url('{% static "images/auth_bg.png" %}');
        background-size: cover;
        background-position: center;
        position: relative;
        display: none;
    }

    @media (min-width: 768px) {
        .gaming-auth-left {
            display: block;
        }
    }

    .gaming-auth-left::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, var(--dark-bg));
    }

    .gaming-auth-right {
        flex: 1;
        padding: 60px 50px;
        background: var(--dark-bg);
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
    }

    .auth-header {
        margin-bottom: 40px;
    }

    .auth-header h1 {
        font-size: 28px;
        font-weight: 900;
        color: white;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }

    .auth-header p {
        color: #94a3b8;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
    }

    .gaming-input-group {
        position: relative;
        margin-bottom: 24px;
    }

    .gaming-input-group input {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 16px 20px;
        color: white;
        font-size: 14px;
        transition: all 0.3s ease;
        outline: none;
    }

    .gaming-input-group input::placeholder {
        color: #64748b;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
    }

    .gaming-input-group input:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
    }

    .password-toggle {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: #64748b;
        cursor: pointer;
        transition: 0.2s;
        z-index: 10;
    }

    .password-toggle:hover {
        color: white;
    }

    .forgot-password {
        display: block;
        text-align: left;
        color: #94a3b8;
        font-size: 12px;
        text-transform: uppercase;
        text-decoration: none;
        margin-top: -12px;
        margin-bottom: 30px;
        letter-spacing: 0.5px;
        transition: color 0.3s;
    }

    .forgot-password:hover {
        color: white;
    }

    .btn-login {
        width: 100%;
        background: var(--accent-blue);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 8px;
        font-weight: 800;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 16px;
    }

    .btn-login:hover {
        background: #2563eb;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        transform: translateY(-2px);
    }

    .btn-signup-outline {
        display: block;
        width: 100%;
        background: transparent;
        color: white;
        border: 1px solid var(--accent-blue);
        padding: 16px;
        border-radius: 8px;
        font-weight: 800;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .btn-signup-outline:hover {
        background: rgba(59, 130, 246, 0.1);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(13, 17, 23, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-left-color: var(--accent-blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>

<div class="auth-page-wrapper">
    <div class="gaming-auth-container" id="login-card">
        <div class="gaming-auth-left"></div>

        <div class="gaming-auth-right">
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
            </div>

            <div class="auth-header">
                <h1>LOG IN ACCOUNT</h1>
                <p>Welcome back</p>
            </div>

            <form method="post" id="login-form">
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div
                    style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 24px; color: #ef4444; font-size: 13px; text-align: center;">
                    {% for error in form.non_field_errors %}{{ error }}{% endfor %}
                </div>
                {% endif %}

                <div class="gaming-input-group">
                    <input type="text" name="username" id="id_username" placeholder="ENTER EMAIL OR USERNAME" required>
                </div>

                <div class="gaming-input-group">
                    <input type="password" name="password" id="id_password" placeholder="ENTER PASSWORD" required>
                    <i class="password-toggle" id="toggle-password">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </i>
                </div>

                <a href="#" class="forgot-password">FORGOT PASSWORD?</a>

                <button type="submit" class="btn-login">LOG IN</button>
                <a href="{% url 'register' %}" class="btn-signup-outline">SIGN UP</a>
            </form>
        </div>
    </div>
</div>

<script>
    // Password toggle logic
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('id_password');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.innerHTML = type === 'password'
            ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
            : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
    });

    // Form submission processing
    const loginForm = document.getElementById('login-form');
    const loadingOverlay = document.getElementById('loading-overlay');

    loginForm.addEventListener('submit', function () {
        loadingOverlay.style.display = 'flex';
    });
</script>
{% endblock %}
